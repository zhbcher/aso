# ASO LLM Configuration
# This file defines providers, models, and fallback chains.
# Edit this file to change LLM settings without modifying code.

providers:
  sensenova:
    base_url: "https://api.sensenova.cn/v1/chat/completions"
    api_key_env: "SENSENOVA_API_KEY"
    models:
      - "deepseek-v4-flash"
      - "sensenova-6.7-flash-lite"

  nvidia:
    base_url: "https://api.nvidia.com/v1/chat/completions"
    api_key_env: "NVIDIA_API_KEY"
    models:
      - "stepfun-ai/step-3.7-flash"
      - "stepfun-ai/step-3.5-flash"
      - "nvidia/llama-3.3-nemotron-super-49b-v1"

  agnes:
    base_url: "https://api.agnesai.com/v1/chat/completions"
    api_key_env: "AGNES_API_KEY"
    models:
      - "agnes-2.0-flash"

pipeline_models:
  round_1_explore:
    provider: "sensenova"
    model: "deepseek-v4-flash"
  round_2_critique:
    provider: "nvidia"
    model: "stepfun-ai/step-3.7-flash"
  round_3_specify:
    provider: "sensenova"
    model: "deepseek-v4-flash"
  round_4_review:
    provider: "nvidia"
    model: "stepfun-ai/step-3.5-flash"

fallback_chain:
  - provider: "sensenova"
    model: "deepseek-v4-flash"
  - provider: "nvidia"
    model: "stepfun-ai/step-3.7-flash"
  - provider: "nvidia"
    model: "stepfun-ai/step-3.5-flash"
  - provider: "sensenova"
    model: "sensenova-6.7-flash-lite"

timeouts:
  default: 60
  max_retries: 2
  retry_delay: 1.0
  max_429_retries: 3
  initial_backoff_429: 2.0
  max_retry_after: 60

generator:
  temperature: 0.7
  max_tokens:
    explore: 1200
    critique: 800
    specify: 1000
    review: 800